<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 315" role="img" aria-label="Drakon logo">
  <defs>
    <linearGradient id="goldFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff9c9"/>
      <stop offset="0.18" stop-color="#ffe477"/>
      <stop offset="0.42" stop-color="#f4b72e"/>
      <stop offset="0.64" stop-color="#ffda63"/>
      <stop offset="0.82" stop-color="#b96f13"/>
      <stop offset="1" stop-color="#5d2603"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#fff2aa" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="logoShadow" x="-8%" y="-18%" width="116%" height="142%">
      <feDropShadow dx="0" dy="13" stdDeviation="4" flood-color="#000000" flood-opacity="0.9"/>
      <feDropShadow dx="8" dy="10" stdDeviation="2" flood-color="#351000" flood-opacity="0.95"/>
      <feDropShadow dx="-5" dy="4" stdDeviation="2" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
    <style>
      .word {
        font-family: Impact, Haettenschweiler, "Arial Black", "Segoe UI Black", sans-serif;
        font-size: 224px;
        font-weight: 900;
        letter-spacing: 2px;
        paint-order: stroke fill;
      }
      .front {
        stroke: #090402;
        stroke-width: 22px;
        stroke-linejoin: round;
      }
      .inner {
        stroke: #fff3a8;
        stroke-width: 4px;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <g filter="url(#logoShadow)">
    <text x="58" y="229" class="word" fill="#2a0900" stroke="#000000" stroke-width="28" textLength="1084" lengthAdjust="spacingAndGlyphs">DRAKON</text>
    <text x="48" y="219" class="word" fill="#5a1a02" stroke="#160500" stroke-width="28" textLength="1084" lengthAdjust="spacingAndGlyphs">DRAKON</text>
    <text x="39" y="209" class="word" fill="#9b4b09" stroke="#000000" stroke-width="27" textLength="1084" lengthAdjust="spacingAndGlyphs">DRAKON</text>
    <text x="32" y="199" class="word front" fill="url(#goldFace)" textLength="1084" lengthAdjust="spacingAndGlyphs">DRAKON</text>
    <text x="32" y="199" class="word inner" fill="none" textLength="1084" lengthAdjust="spacingAndGlyphs">DRAKON</text>
    <text x="32" y="154" class="word" fill="url(#goldHighlight)" stroke="none" opacity="0.62" textLength="1084" lengthAdjust="spacingAndGlyphs">DRAKON</text>
  </g>
</svg>
